[build]
builder = "RAILPACK"
buildCommand = "npm run build"

[deploy]
preDeployCommand = "npm run db:setup"
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.teardown]
drainingSeconds = 30
overlapSeconds = 15
